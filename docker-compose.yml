services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smart_school
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./smart_school_backend
    env_file:
      - ./smart_school_backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/smart_school
      BACKEND_CORS_ORIGINS: '["http://localhost:5173","http://localhost:8080"]'
    depends_on:
      - db
    ports:
      - "8000:8000"

  web:
    build:
      context: ./frontend/admin-web
      args:
        VITE_API_URL: ""
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  postgres_data:
